apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-reader
  namespace: banking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: banking-read-only-role
  namespace: banking
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: banking-read-only-binding
  namespace: banking
subjects:
  - kind: ServiceAccount
    name: banking-reader
    namespace: banking
roleRef:
  kind: Role
  name: banking-read-only-role
  apiGroup: rbac.authorization.k8s.io
